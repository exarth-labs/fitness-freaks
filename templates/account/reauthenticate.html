{% extends 'account/base.html' %}
{% load i18n %}
{% load crispy_forms_tags %}

{% block subtitle %}Confirm Access{% endblock %}

{% block content %}
<div class="card border-0 bg-grey mt-4 rounded-20">
    <div class="card-body p-4">
        <div class="text-center border-bottom mb-3">
            <h3 class="shadow-text mb-2">Confirm Access</h3>
            <p class="text-muted small mb-3">Please enter your password to continue.</p>
        </div>
        <div class="p-2 mt-3">
            <form method="POST" action="{% url 'account_reauthenticate' %}">
                {% csrf_token %}
                {{ form|crispy }}
                {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                {% endif %}
                <div class="col-12 mt-3">
                    <button class="btn rounded-pill btn-primary w-100" type="submit">
                        {% trans "Confirm" %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
