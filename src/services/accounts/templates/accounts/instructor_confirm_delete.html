{% extends 'base.html' %}

{% block subtitle %}Delete Instructor{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger-subtle mt-5">
                <div class="card-header bg-white">
                    <h5 class="mb-0 text-danger"><i class="bx bx-trash me-2"></i>Delete Instructor</h5>
                </div>
                <div class="card-body">
                    <p class="mb-4">
                        Are you sure you want to delete instructor <strong>{{ object }}</strong>?
                        This action cannot be undone.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="bx bx-trash me-1"></i> Yes, Delete
                            </button>
                            <a href="javascript:window.history.back();" class="btn btn-light">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
